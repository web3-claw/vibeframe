<template id="scene-intro-template">
  <div data-composition-id="intro" data-start="0" data-duration="3" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="intro"] {
        position: absolute; inset: 0; width: 100%; height: 100%;
        font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
        color: #fff; overflow: hidden; background: #000;
      }
      [data-composition-id="intro"] .backdrop {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background-image: url("assets/scene-intro.png");
        background-size: cover;
        background-position: center;
      }
      [data-composition-id="intro"] .backdrop::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.55) 100%);
      }
      [data-composition-id="intro"] .backdrop { transform-origin: center; }
      [data-composition-id="intro"] .announce {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        text-align: center;
        padding: 0 8%;
      }
      [data-composition-id="intro"] .announce h1 {
        margin: 0;
        font-size: 153px;
        font-weight: 900;
        letter-spacing: -4px;
        line-height: 1.05;
        overflow-wrap: break-word;
        background: linear-gradient(90deg, #8e2de2, #00c9ff);
        -webkit-background-clip: text; background-clip: text; color: transparent;
        text-shadow: 0 8px 40px rgba(142,45,226,0.35);
      }
    </style>

    <div class="backdrop"></div>
    <div class="announce"><h1 id="headline">Ship videos, not clicks</h1></div>

    <audio
      id="narration"
      data-start="0"
      data-duration="auto"
      data-track-index="2"
      src="assets/narration-intro.wav"
      data-volume="1"
    ></audio>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from('[data-composition-id="intro"]', { opacity: 0, duration: 0.4, ease: 'power2.out' }, 0);
      tl.to('[data-composition-id="intro"]', { opacity: 0, duration: 0.4, ease: 'power2.in' }, 2.60);
      tl.fromTo('[data-composition-id="intro"] .backdrop', { scale: 1.0 }, { scale: 1.08, duration: 3.00, ease: 'none' }, 0);
      tl.from('[data-composition-id="intro"] #headline', { opacity: 0, scale: 0.92, duration: 0.55, ease: 'power3.out' }, 0.05);
      tl.to('[data-composition-id="intro"] #headline', { scale: 1.04, y: -8, duration: 1.5, yoyo: true, repeat: 0, ease: 'sine.inOut' }, 1.00);

      window.__timelines["intro"] = tl;
    </script>
  </div>
</template>
