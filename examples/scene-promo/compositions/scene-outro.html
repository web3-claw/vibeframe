<template id="scene-outro-template">
  <div data-composition-id="outro" data-start="0" data-duration="3" data-width="1920" data-height="1080">
    <style>
      [data-composition-id="outro"] {
        position: absolute; inset: 0; width: 100%; height: 100%;
        font-family: "Helvetica Neue", Arial, sans-serif;
        color: #fff; overflow: hidden; background: #000;
      }
      [data-composition-id="outro"] .backdrop {
        position: absolute;
        inset: 0;
        width: 100%;
        height: 100%;
        background-image: url("assets/scene-outro.png");
        background-size: cover;
        background-position: center;
      }
      [data-composition-id="outro"] .backdrop::after {
        content: "";
        position: absolute;
        inset: 0;
        background: linear-gradient(180deg, rgba(0,0,0,0.0) 30%, rgba(0,0,0,0.55) 100%);
      }
      [data-composition-id="outro"] .backdrop { transform-origin: center; }
      [data-composition-id="outro"] .kinetic {
        position: absolute; inset: 0;
        display: flex; align-items: center; justify-content: center;
        flex-wrap: wrap; gap: 8px 16px;
        text-align: center; padding: 0 6%;
        font-size: 140px; font-weight: 900; letter-spacing: -6px;
        line-height: 1; text-shadow: 0 6px 30px rgba(0,0,0,0.6);
        overflow-wrap: break-word;
      }
      [data-composition-id="outro"] .kinetic .word { display: inline-block; margin: 0 12px; }
    </style>

    <div class="backdrop"></div>
    <div class="kinetic"><span class="word" data-i="0" id="w-0">Made</span> <span class="word" data-i="1" id="w-1">with</span> <span class="word" data-i="2" id="w-2">vibe</span> <span class="word" data-i="3" id="w-3">scene</span></div>

    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });

      tl.from('[data-composition-id="outro"]', { opacity: 0, duration: 0.4, ease: 'power2.out' }, 0);
      tl.to('[data-composition-id="outro"]', { opacity: 0, duration: 0.4, ease: 'power2.in' }, 2.60);
      tl.fromTo('[data-composition-id="outro"] .backdrop', { scale: 1.0 }, { scale: 1.08, duration: 3.00, ease: 'none' }, 0);
      tl.from('[data-composition-id="outro"] #w-0', { opacity: 0, y: 80, scale: 0.8, duration: 0.45, ease: 'back.out(1.8)' }, 0.05);
      tl.from('[data-composition-id="outro"] #w-1', { opacity: 0, y: 80, scale: 0.8, duration: 0.45, ease: 'back.out(1.8)' }, 0.35);
      tl.from('[data-composition-id="outro"] #w-2', { opacity: 0, y: 80, scale: 0.8, duration: 0.45, ease: 'back.out(1.8)' }, 0.65);
      tl.from('[data-composition-id="outro"] #w-3', { opacity: 0, y: 80, scale: 0.8, duration: 0.45, ease: 'back.out(1.8)' }, 0.95);
      

      window.__timelines["outro"] = tl;
    </script>
  </div>
</template>
